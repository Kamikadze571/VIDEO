<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>recordings · {{ camera.name }}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="admin">
  <header class="top">
    <div class="brand">recordings <span class="muted">· {{ camera.name }} · id {{ camera.id }}</span></div>
    <a href="/admin" class="btn">← admin</a>
  </header>

  <section class="card">
    <h2>files ({{ files|length }})</h2>
    {% if not files %}
      <p class="muted">пусто. включи rec в админке.</p>
    {% else %}
      <table class="cams">
        <thead><tr><th>file</th><th>size</th><th></th></tr></thead>
        <tbody>
        {% for f in files %}
          <tr>
            <td><span class="mono">{{ f.name }}</span></td>
            <td class="mono">{{ '%.2f'|format(f.size / 1024 / 1024) }} mb</td>
            <td>
              <a class="btn small" href="/admin/recordings/{{ camera.id }}/file?name={{ f.name|urlencode }}">download</a>
            </td>
          </tr>
        {% endfor %}
        </tbody>
      </table>
    {% endif %}
  </section>
</body>
</html>
