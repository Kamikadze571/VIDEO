<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cameras</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="top">
    <div class="brand">cameras<span class="dot">·</span><span class="count">{{ cameras|length }}</span></div>
    <div class="controls">
      <button id="pause">pause</button>
      <button id="edit-mode" title="перетаскивание (нужен пароль)">edit</button>
      <a href="/admin" class="btn">admin</a>
    </div>
  </header>

  <main id="grid" class="grid"
        data-cameras='{{ cameras|tojson }}'
        data-fps="{{ fps }}"
        data-tile-size="{{ tile_size }}"
        style="--tile:{{ tile_size }}px"></main>

  <script src="/static/app.js"></script>
</body>
</html>
